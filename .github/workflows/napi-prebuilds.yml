name: napi-prebuilds

on:
  # Fires when changesets/action pushes a per-package tag like
  # `@gentleduck/md@1.2.3` from the merged Version Packages PR.
  push:
    tags:
      - '@gentleduck/md@*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  WORKDIR: dmc-napi
  PKG: '@gentleduck/md'
  HUSKY: '0'

jobs:
  build:
    name: ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # ----- macOS ---------------------------------------------------
          - host: macos-latest
            target: x86_64-apple-darwin
            build: pnpm exec napi build --platform --release --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: pnpm exec napi build --platform --release --target aarch64-apple-darwin

          # ----- Windows -------------------------------------------------
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm exec napi build --platform --release --target x86_64-pc-windows-msvc

          # ----- Linux glibc ---------------------------------------------
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: pnpm exec napi build --platform --release --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
            build: pnpm exec napi build --platform --release --target aarch64-unknown-linux-gnu

          # ----- Linux musl ----------------------------------------------
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: pnpm exec napi build --platform --release --target x86_64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      # Node + pnpm only needed on hosts (docker images already have them).
      - name: setup node
        if: ${{ !matrix.settings.docker }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup pnpm
        if: ${{ !matrix.settings.docker }}
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: setup rust
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      # ---- Host build ---------------------------------------------------
      - name: install deps (host)
        if: ${{ !matrix.settings.docker }}
        working-directory: ${{ env.WORKDIR }}
        run: pnpm install --frozen-lockfile=false

      - name: build (host)
        if: ${{ !matrix.settings.docker }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: ${{ matrix.settings.build }}

      # ---- Docker build (linux gnu/musl cross) -------------------------
      # The napi-rs nodejs-rust images already ship Node + Rust + the
      # right cross toolchain. We bypass corepack (broken signature
      # verification on these older images) and install pnpm directly.
      - name: build (docker)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: -v ${{ github.workspace }}:/build -w /build/${{ env.WORKDIR }} -e HUSKY=0
          run: |
            set -e
            # Bundled corepack has stale keyids and rejects current pnpm
            # signatures; sidestep it and install pnpm as a normal global.
            corepack disable || true
            npm install -g --force pnpm@10
            # Image ships Rust 1.82 but the workspace uses edition2024,
            # which requires >=1.85. Pull a current stable toolchain.
            rustup default stable
            rustup update stable
            rustup target add ${{ matrix.settings.target }} || true
            # libquickjs-sys's build.rs shells out to `patch`, which
            # is not preinstalled on the Debian napi-rs images. Alpine
            # already has it.
            if command -v apt-get >/dev/null; then
              apt-get update && apt-get install -y --no-install-recommends patch
            fi
            pnpm install --frozen-lockfile=false
            ${{ matrix.settings.build }}

      - name: tsc
        if: ${{ !matrix.settings.docker }}
        working-directory: ${{ env.WORKDIR }}
        run: pnpm exec tsc -p tsconfig.json

      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ env.WORKDIR }}/*.node
          if-no-files-found: error

      # The napi-rs CLI also writes a deterministic index.js / index.d.ts
      # shim alongside the .node files. Upload it from one matrix entry
      # so the publish job has exactly one copy to ship.
      - uses: actions/upload-artifact@v7
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        with:
          name: napi-shim
          path: |
            ${{ env.WORKDIR }}/index.js
            ${{ env.WORKDIR }}/index.d.ts
          if-no-files-found: error

  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/@gentleduck/md@')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/download-artifact@v8
        with:
          path: ${{ env.WORKDIR }}/artifacts

      - name: collect prebuilds
        working-directory: ${{ env.WORKDIR }}
        run: |
          set -e
          mkdir -p npm
          for dir in artifacts/bindings-*; do
            cp "$dir"/*.node npm/ || true
            cp "$dir"/*.node . || true
          done
          # The napi-rs shim (index.js + index.d.ts) is uploaded from the
          # x86_64-linux-gnu matrix entry. mod.js loads `./index.cjs` first
          # (the only form node will accept via createRequire from an ESM
          # module in a `"type": "module"` package); we copy that alongside
          # the original `.js` for tooling that resolves the napi default.
          if [ -d artifacts/napi-shim ]; then
            cp artifacts/napi-shim/index.js .
            cp artifacts/napi-shim/index.js index.cjs
            cp artifacts/napi-shim/index.d.ts .
          fi
          ls -la

      - name: install deps + tsc
        working-directory: ${{ env.WORKDIR }}
        run: |
          pnpm install --frozen-lockfile=false
          pnpm exec tsc -p tsconfig.json

      - name: verify tag matches package version
        working-directory: ${{ env.WORKDIR }}
        run: |
          set -e
          tag="${GITHUB_REF#refs/tags/}"
          want="${tag#${PKG}@}"
          have=$(node -p "require('./package.json').version")
          echo "tag=$tag want=$want have=$have"
          test "$want" = "$have"

      - name: publish
        working-directory: ${{ env.WORKDIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks
